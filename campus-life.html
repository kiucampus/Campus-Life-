<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Campus Life - 3D University Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', 'Noto Sans Bengali', sans-serif; background: #000; }
  #game-canvas { display: block; width: 100vw; height: 100vh; }
  .hidden { display: none !important; }

  #loading-screen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #1a2a6c, #0d0d2b);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: white; z-index: 100;
  }
  #loading-screen h1 { font-size: 2.5rem; margin-bottom: 10px; letter-spacing: 2px; }

  #hud { position: fixed; top: 0; left: 0; width: 100%; z-index: 10; pointer-events: none; }
  #controls-hint {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 14px; padding: 8px 18px; color: white; font-size: 0.85rem; white-space: nowrap;
  }

  #mobile-controls { position: fixed; bottom: 30px; left: 30px; z-index: 20; }
  #joystick-zone {
    width: 110px; height: 110px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.25);
  }

  @media (max-width: 768px) { #controls-hint { display: none; } }
</style>
</head>
<body>
  <div id="loading-screen">
    <h1>Campus Life</h1>
    <p>লোড হচ্ছে...</p>
  </div>

  <div id="hud" class="hidden">
    <div id="controls-hint">
      চলার জন্য: W A S D &nbsp;|&nbsp; ক্যামেরা ঘোরানো: মাউস/টাচ ড্র্যাগ &nbsp;|&nbsp; দৌড়ানো: Shift
    </div>
  </div>

  <div id="mobile-controls" class="hidden">
    <div id="joystick-zone"></div>
  </div>

  <canvas id="game-canvas"></canvas>

  <!-- Three.js CDN থেকে - কোনো npm build লাগবে না, GitHub Pages এ সরাসরি চলবে -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ---------- বেসিক সেটআপ ----------
    const canvas = document.getElementById('game-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x8fc7ff);
    scene.fog = new THREE.Fog(0x8fc7ff, 60, 300);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

    // ---------- লাইটিং ----------
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x3a5c3a, 0.6);
    scene.add(hemiLight);

    const sunLight = new THREE.DirectionalLight(0xfff2d0, 1.4);
    sunLight.position.set(60, 90, 40);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    sunLight.shadow.camera.left = -120;
    sunLight.shadow.camera.right = 120;
    sunLight.shadow.camera.top = 120;
    sunLight.shadow.camera.bottom = -120;
    sunLight.shadow.camera.far = 300;
    scene.add(sunLight);

    // ---------- মাটি ----------
    const groundGeo = new THREE.PlaneGeometry(400, 400);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 1 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // ---------- রোড ----------
    function createRoad(x, z, width, depth) {
      const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
      const road = new THREE.Mesh(new THREE.PlaneGeometry(width, depth), roadMat);
      road.rotation.x = -Math.PI / 2;
      road.position.set(x, 0.01, z);
      road.receiveShadow = true;
      scene.add(road);
    }
    createRoad(0, 0, 10, 260);
    createRoad(0, 40, 200, 10);

    // ---------- লেবেল ----------
    function addLabel(text, x, y, z) {
      const canvasEl = document.createElement('canvas');
      canvasEl.width = 512;
      canvasEl.height = 128;
      const ctx = canvasEl.getContext('2d');
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.beginPath();
      ctx.roundRect(0, 20, 512, 88, 20);
      ctx.fill();
      ctx.font = 'bold 48px sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 256, 64);

      const texture = new THREE.CanvasTexture(canvasEl);
      const spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: false });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.scale.set(8, 2, 1);
      sprite.position.set(x, y, z);
      scene.add(sprite);
    }

    // ---------- বিল্ডিং ----------
    function createBuilding({ x, z, width, height, depth, color = 0xd9c9a3, label }) {
      const group = new THREE.Group();

      const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.8 });
      const body = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), bodyMat);
      body.position.y = height / 2;
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const roofMat = new THREE.MeshStandardMaterial({ color: 0x8b3a3a, roughness: 0.7 });
      const roof = new THREE.Mesh(new THREE.BoxGeometry(width + 1, 0.6, depth + 1), roofMat);
      roof.position.y = height + 0.3;
      roof.castShadow = true;
      group.add(roof);

      const winMat = new THREE.MeshStandardMaterial({ color: 0x9fd8ff, emissive: 0x223344, roughness: 0.3 });
      const rows = Math.max(1, Math.floor(height / 3));
      const cols = Math.max(2, Math.floor(width / 3));
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const win = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 0.1), winMat);
          win.position.set(
            -width / 2 + (c + 0.5) * (width / cols),
            1.8 + r * 3,
            depth / 2 + 0.05
          );
          group.add(win);
        }
      }

      group.position.set(x, 0, z);
      scene.add(group);
      if (label) addLabel(label, x, height + 2, z);
      return group;
    }

    createBuilding({ x: -30, z: -20, width: 24, height: 14, depth: 14, color: 0xe8d9b5, label: 'একাডেমিক ভবন' });
    createBuilding({ x: 30, z: -20, width: 16, height: 10, depth: 12, color: 0xcfd8dc, label: 'লাইব্রেরি' });
    createBuilding({ x: 30, z: 10, width: 18, height: 12, depth: 14, color: 0xd7bfae, label: 'অডিটোরিয়াম' });
    createBuilding({ x: -30, z: 10, width: 14, height: 8, depth: 10, color: 0xf0e0a0, label: 'ক্যাফেটেরিয়া' });
    createBuilding({ x: -55, z: -20, width: 16, height: 11, depth: 12, color: 0xc9b28a, label: 'ডিপার্টমেন্ট ভবন' });
    createBuilding({ x: -55, z: 10, width: 16, height: 11, depth: 12, color: 0xb8a99a, label: 'প্রশাসনিক ভবন' });

    // ---------- ফুটবল মাঠ ----------
    function createFootballField() {
      const fieldMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32, roughness: 1 });
      const field = new THREE.Mesh(new THREE.PlaneGeometry(60, 40), fieldMat);
      field.rotation.x = -Math.PI / 2;
      field.position.set(30, 0.02, 60);
      field.receiveShadow = true;
      scene.add(field);

      const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
      const points = [
        new THREE.Vector3(0, 0.05, 40), new THREE.Vector3(60, 0.05, 40),
        new THREE.Vector3(60, 0.05, 80), new THREE.Vector3(0, 0.05, 80),
        new THREE.Vector3(0, 0.05, 40),
      ];
      const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
      scene.add(new THREE.Line(lineGeo, lineMat));

      function createGoalPost(x, z) {
        const postMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const group = new THREE.Group();
        const postGeo = new THREE.CylinderGeometry(0.12, 0.12, 3, 8);
        const left = new THREE.Mesh(postGeo, postMat);
        left.position.set(-3.5, 1.5, 0);
        const right = new THREE.Mesh(postGeo, postMat);
        right.position.set(3.5, 1.5, 0);
        const crossGeo = new THREE.CylinderGeometry(0.12, 0.12, 7, 8);
        const cross = new THREE.Mesh(crossGeo, postMat);
        cross.rotation.z = Math.PI / 2;
        cross.position.set(0, 3, 0);
        group.add(left, right, cross);
        group.position.set(x, 0, z);
        scene.add(group);
      }
      createGoalPost(30, 42);
      createGoalPost(30, 78);
      addLabel('ওপেন ফিল্ড / ফুটবল মাঠ', 30, 3, 60);
    }
    createFootballField();

    // ---------- গাছ ----------
    function createTree(x, z) {
      const group = new THREE.Group();
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.25, 0.35, 2.2, 8),
        new THREE.MeshStandardMaterial({ color: 0x6d4c33 })
      );
      trunk.position.y = 1.1;
      trunk.castShadow = true;

      const leaves = new THREE.Mesh(
        new THREE.SphereGeometry(1.6, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0x2e7d32 })
      );
      leaves.position.y = 3;
      leaves.castShadow = true;

      group.add(trunk, leaves);
      group.position.set(x, 0, z);
      scene.add(group);
    }

    // ---------- স্ট্রিট লাইট ----------
    function createStreetLight(x, z) {
      const group = new THREE.Group();
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.1, 0.1, 5, 8),
        new THREE.MeshStandardMaterial({ color: 0x222222 })
      );
      pole.position.y = 2.5;

      const bulb = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0xfff3b0, emissive: 0xfff3b0, emissiveIntensity: 1 })
      );
      bulb.position.y = 5.1;

      const light = new THREE.PointLight(0xfff3b0, 4, 15);
      light.position.y = 5;

      group.add(pole, bulb, light);
      group.position.set(x, 0, z);
      scene.add(group);
    }

    // ---------- বেঞ্চ ----------
    function createBench(x, z, rotY = 0) {
      const group = new THREE.Group();
      const woodMat = new THREE.MeshStandardMaterial({ color: 0x8d5a2b });
      const seat = new THREE.Mesh(new THREE.BoxGeometry(2, 0.15, 0.6), woodMat);
      seat.position.y = 0.5;
      const back = new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 0.1), woodMat);
      back.position.set(0, 0.85, -0.25);
      group.add(seat, back);
      group.position.set(x, 0, z);
      group.rotation.y = rotY;
      scene.add(group);
    }

    for (let i = -100; i <= 100; i += 20) {
      createTree(i, 55);
      createTree(i, -50);
      createStreetLight(i, 45);
      if (i % 40 === 0) createBench(i, 50, 0);
    }

    // ---------- গেট + সিকিউরিটি বুথ ----------
    function createGate() {
      const group = new THREE.Group();
      const pillarMat = new THREE.MeshStandardMaterial({ color: 0xb0a08a });
      const pillarGeo = new THREE.BoxGeometry(1.5, 8, 1.5);
      const left = new THREE.Mesh(pillarGeo, pillarMat);
      left.position.set(-6, 4, 0);
      const right = new THREE.Mesh(pillarGeo, pillarMat);
      right.position.set(6, 4, 0);
      const top = new THREE.Mesh(new THREE.BoxGeometry(14, 1.5, 1.5), pillarMat);
      top.position.set(0, 8, 0);
      left.castShadow = right.castShadow = top.castShadow = true;
      group.add(left, right, top);
      group.position.set(0, 0, -120);
      scene.add(group);
      addLabel('ইউনিভার্সিটি গেট', 0, 10, -120);

      const booth = new THREE.Mesh(
        new THREE.BoxGeometry(3, 2.6, 3),
        new THREE.MeshStandardMaterial({ color: 0x99b6c8 })
      );
      booth.position.set(10, 1.3, -120);
      booth.castShadow = true;
      scene.add(booth);
      addLabel('সিকিউরিটি বুথ', 10, 3.5, -120);
    }
    createGate();

    // ---------- মেঘ ----------
    function createCloud(x, y, z) {
      const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
      const group = new THREE.Group();
      for (let i = 0; i < 4; i++) {
        const puff = new THREE.Mesh(new THREE.SphereGeometry(3 + Math.random() * 2, 8, 8), cloudMat);
        puff.position.set(i * 3, Math.random(), 0);
        group.add(puff);
      }
      group.position.set(x, y, z);
      scene.add(group);
      return group;
    }
    const clouds = [createCloud(-40, 45, -30), createCloud(20, 50, 30), createCloud(60, 42, -60)];

    // ---------- খেলোয়াড় (প্লেসহোল্ডার, পরে GLTF মডেল বসবে) ----------
    // ক্যারেক্টার ক্রিয়েশন স্ক্রিন থেকে সেভ করা ডেটা পড়া
    let charData = { gender: 'male', skin: '#e0b088', height: 170, name: 'Player', dept: 'CSE', batch: '1st' };
    try {
      const saved = localStorage.getItem('campusLifeCharacter');
      if (saved) charData = JSON.parse(saved);
    } catch (e) { /* ডেটা না থাকলে ডিফল্ট ব্যবহার হবে */ }

    // জার্সি টেক্সচার আবার বানানো (নাম/ডিপার্টমেন্ট/ব্যাচ দিয়ে)
    const jerseyCanvasEl = document.createElement('canvas');
    jerseyCanvasEl.width = 512;
    jerseyCanvasEl.height = 512;
    const jctx = jerseyCanvasEl.getContext('2d');
    jctx.fillStyle = '#1b3a8a';
    jctx.fillRect(0, 0, 512, 512);
    jctx.fillStyle = '#ffcc00';
    jctx.fillRect(0, 0, 40, 512);
    jctx.fillRect(472, 0, 40, 512);
    jctx.textAlign = 'center';
    jctx.fillStyle = '#ffffff';
    jctx.font = 'bold 46px sans-serif';
    jctx.fillText((charData.name || 'PLAYER').toUpperCase(), 256, 120);
    jctx.font = 'bold 190px sans-serif';
    jctx.fillText((charData.batch || '1').replace(/\D/g, '') || '1', 256, 330);
    jctx.font = 'bold 34px sans-serif';
    jctx.fillText(charData.dept || 'CSE', 256, 420);
    const jerseyTex = new THREE.CanvasTexture(jerseyCanvasEl);

    const player = new THREE.Group();
    const heightScale = (charData.height || 170) / 170;
    const torso = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.4, 1.0, 4, 8),
      new THREE.MeshStandardMaterial({ map: jerseyTex, roughness: 0.7 })
    );
    torso.position.y = 1.1 * heightScale;
    torso.scale.set(1, heightScale, 1);
    torso.castShadow = true;
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.28, 12, 12),
      new THREE.MeshStandardMaterial({ color: charData.skin || 0xe0b088 })
    );
    head.position.y = 1.85 * heightScale;
    head.castShadow = true;
    player.add(torso, head);
    player.position.set(0, 0, 20);
    scene.add(player);

    // HUD-এ প্লেয়ারের নাম/ডিপার্টমেন্ট দেখানো
    addLabel(`${charData.name} | ${charData.dept} | Batch ${charData.batch}`, 0, 3.2, 20);

    // ---------- থার্ড-পারসন ক্যামেরা ----------
    let cameraYaw = Math.PI;
    let cameraPitch = 0.35;
    const cameraDistance = 8;

    function updateCamera() {
      const offsetX = Math.sin(cameraYaw) * Math.cos(cameraPitch) * cameraDistance;
      const offsetZ = Math.cos(cameraYaw) * Math.cos(cameraPitch) * cameraDistance;
      const offsetY = Math.sin(cameraPitch) * cameraDistance + 2;
      camera.position.set(
        player.position.x + offsetX,
        player.position.y + offsetY,
        player.position.z + offsetZ
      );
      camera.lookAt(player.position.x, player.position.y + 1.4, player.position.z);
    }

    // ---------- ইনপুট ----------
    const keys = {};
    window.addEventListener('keydown', (e) => (keys[e.key.toLowerCase()] = true));
    window.addEventListener('keyup', (e) => (keys[e.key.toLowerCase()] = false));

    let isDragging = false, lastX = 0, lastY = 0;
    canvas.addEventListener('pointerdown', (e) => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('pointerup', () => (isDragging = false));
    window.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      cameraYaw -= dx * 0.005;
      cameraPitch = Math.max(0.1, Math.min(1.2, cameraPitch + dy * 0.005));
      lastX = e.clientX;
      lastY = e.clientY;
    });

    const isTouchDevice = 'ontouchstart' in window;
    const joystickZone = document.getElementById('joystick-zone');
    let joyVec = { x: 0, y: 0 };
    if (isTouchDevice) {
      document.getElementById('mobile-controls').classList.remove('hidden');
      let joyActive = false, joyStartX = 0, joyStartY = 0;
      joystickZone.addEventListener('touchstart', (e) => {
        joyActive = true;
        joyStartX = e.touches[0].clientX;
        joyStartY = e.touches[0].clientY;
      });
      joystickZone.addEventListener('touchmove', (e) => {
        if (!joyActive) return;
        const dx = e.touches[0].clientX - joyStartX;
        const dy = e.touches[0].clientY - joyStartY;
        const maxDist = 50;
        joyVec.x = Math.max(-1, Math.min(1, dx / maxDist));
        joyVec.y = Math.max(-1, Math.min(1, dy / maxDist));
      });
      joystickZone.addEventListener('touchend', () => {
        joyActive = false;
        joyVec.x = 0;
        joyVec.y = 0;
      });
    }

    // ---------- মুভমেন্ট ----------
    const moveSpeed = 6;
    const clock = new THREE.Clock();

    function updateMovement(delta) {
      let moveX = 0, moveZ = 0;
      if (keys['w']) moveZ -= 1;
      if (keys['s']) moveZ += 1;
      if (keys['a']) moveX -= 1;
      if (keys['d']) moveX += 1;

      moveX += joyVec.x;
      moveZ += joyVec.y;

      const len = Math.hypot(moveX, moveZ);
      if (len > 0.01) {
        moveX /= len;
        moveZ /= len;
        const speed = (keys['shift'] ? moveSpeed * 1.8 : moveSpeed) * delta;

        const forward = new THREE.Vector3(Math.sin(cameraYaw), 0, Math.cos(cameraYaw));
        const right = new THREE.Vector3(Math.cos(cameraYaw), 0, -Math.sin(cameraYaw));
        const move = new THREE.Vector3()
          .addScaledVector(forward, -moveZ)
          .addScaledVector(right, moveX)
          .normalize()
          .multiplyScalar(speed);

        player.position.add(move);
        player.rotation.y = Math.atan2(move.x, move.z);
      }
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    setTimeout(() => {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('hud').classList.remove('hidden');
    }, 800);

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.1);

      updateMovement(delta);
      updateCamera();

      clouds.forEach((c, i) => {
        c.position.x += delta * (0.5 + i * 0.2);
        if (c.position.x > 150) c.position.x = -150;
      });

      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
