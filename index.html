<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Life - 3D University Simulator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- লোডিং স্ক্রিন -->
  <div id="loading-screen">
    <h1>Campus Life</h1>
    <p>লোড হচ্ছে... <span id="loading-percent">0%</span></p>
  </div>

  <!-- HUD (গেম চলাকালীন উপরে দেখাবে) -->
  <div id="hud" class="hidden">
    <div id="controls-hint">
      চলার জন্য: W A S D &nbsp;|&nbsp; ক্যামেরা ঘোরানো: মাউস ড্র্যাগ / টাচ ড্র্যাগ &nbsp;|&nbsp; দৌড়ানো: Shift
    </div>
  </div>

  <!-- মোবাইল ভার্চুয়াল জয়স্টিক -->
  <div id="mobile-controls" class="hidden">
    <div id="joystick-zone"></div>
  </div>

  <canvas id="game-canvas"></canvas>

  <!-- Three.js (CDN থেকে, তাই কোনো npm build লাগবে না - GitHub Pages এ সরাসরি চলবে) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
