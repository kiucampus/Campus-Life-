<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Campus Life - ক্যারেক্টার তৈরি করুন</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Noto Sans Bengali', sans-serif; }
  body { overflow: hidden; background: #0d0d2b; }
  #preview-canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; }

  #panel {
    position: fixed; top: 0; right: 0; height: 100vh; width: 360px;
    background: rgba(20, 20, 40, 0.55);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-left: 1px solid rgba(255,255,255,0.15);
    padding: 22px; overflow-y: auto; color: white;
  }
  #panel h1 { font-size: 1.3rem; margin-bottom: 18px; text-align: center; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 0.82rem; opacity: 0.85; margin-bottom: 6px; }

  input[type="text"], select {
    width: 100%; padding: 10px 12px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08); color: white; font-size: 0.9rem;
  }
  select option { color: #111; }

  .toggle-row { display: flex; gap: 8px; }
  .toggle-btn {
    flex: 1; padding: 10px; text-align: center; border-radius: 10px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.06);
    font-size: 0.85rem; transition: 0.2s;
  }
  .toggle-btn.active { background: linear-gradient(135deg,#4e6cff,#8a4eff); border-color: transparent; }

  .swatch-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
  .swatch.active { border-color: #fff; transform: scale(1.15); }

  input[type="range"] { width: 100%; }

  #start-btn {
    width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 14px;
    background: linear-gradient(135deg,#4e6cff,#8a4eff); color: white; font-size: 1rem; font-weight: bold;
    cursor: pointer;
  }
  #start-btn:active { transform: scale(0.98); }

  #rotate-hint {
    position: fixed; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.4);
    padding: 8px 14px; border-radius: 10px; font-size: 0.8rem; backdrop-filter: blur(6px);
  }

  @media (max-width: 700px) {
    #panel { width: 100vw; height: 46vh; top: auto; bottom: 0; border-left: none; border-top: 1px solid rgba(255,255,255,0.15); }
  }
</style>
</head>
<body>
  <canvas id="preview-canvas"></canvas>
  <div id="rotate-hint">টেনে ক্যারেক্টার ঘোরান 🔄</div>

  <div id="panel">
    <h1>🎓 ক্যারেক্টার তৈরি করুন</h1>

    <div class="field">
      <label>লিঙ্গ</label>
      <div class="toggle-row">
        <div class="toggle-btn active" data-group="gender" data-value="male">👨 ছেলে</div>
        <div class="toggle-btn" data-group="gender" data-value="female">👩 মেয়ে</div>
      </div>
    </div>

    <div class="field">
      <label>নাম</label>
      <input type="text" id="playerName" placeholder="আপনার নাম লিখুন" maxlength="16" value="Rafiq" />
    </div>

    <div class="field">
      <label>স্কিন টোন</label>
      <div class="swatch-row" id="skinSwatches"></div>
    </div>

    <div class="field">
      <label>হেয়ার স্টাইল</label>
      <div class="toggle-row">
        <div class="toggle-btn active" data-group="hair" data-value="short">শর্ট</div>
        <div class="toggle-btn" data-group="hair" data-value="long">লম্বা</div>
        <div class="toggle-btn" data-group="hair" data-value="none">নেই</div>
      </div>
    </div>

    <div class="field">
      <label>হাইট: <span id="heightVal">170</span> cm</label>
      <input type="range" id="heightSlider" min="150" max="195" value="170" />
    </div>

    <div class="field">
      <label>ডিপার্টমেন্ট</label>
      <select id="deptSelect">
        <option value="CSE">CSE</option>
        <option value="Accounting">Accounting</option>
        <option value="Mathematics">Mathematics</option>
        <option value="English">English</option>
      </select>
    </div>

    <div class="field">
      <label>ব্যাচ</label>
      <select id="batchSelect">
        <option value="1st">1st</option>
        <option value="2nd">2nd</option>
        <option value="3rd">3rd</option>
        <option value="4th">4th</option>
        <option value="5th">5th</option>
      </select>
    </div>

    <button id="start-btn">ক্যাম্পাসে প্রবেশ করুন ➜</button>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ---------- স্টেট ----------
    const state = {
      gender: 'male',
      hair: 'short',
      skin: '#e0b088',
      height: 170,
      name: 'Rafiq',
      dept: 'CSE',
      batch: '1st',
    };

    // ---------- স্কিন টোন সোয়াচ ----------
    const skinTones = ['#f0c9a0', '#e0b088', '#c68863', '#a86b45', '#7a4a2a'];
    const skinContainer = document.getElementById('skinSwatches');
    skinTones.forEach((color, i) => {
      const el = document.createElement('div');
      el.className = 'swatch' + (i === 1 ? ' active' : '');
      el.style.background = color;
      el.addEventListener('click', () => {
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        state.skin = color;
        updateCharacter();
      });
      skinContainer.appendChild(el);
    });

    // ---------- টগল বাটন (জেন্ডার/হেয়ার) ----------
    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const group = btn.dataset.group;
        document.querySelectorAll(`.toggle-btn[data-group="${group}"]`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state[group] = btn.dataset.value;
        updateCharacter();
      });
    });

    // ---------- ইনপুট/সিলেক্ট ----------
    document.getElementById('playerName').addEventListener('input', (e) => {
      state.name = e.target.value || 'Player';
      updateJersey();
    });
    document.getElementById('heightSlider').addEventListener('input', (e) => {
      state.height = parseInt(e.target.value);
      document.getElementById('heightVal').textContent = state.height;
      updateCharacter();
    });
    document.getElementById('deptSelect').addEventListener('change', (e) => {
      state.dept = e.target.value;
      updateJersey();
    });
    document.getElementById('batchSelect').addEventListener('change', (e) => {
      state.batch = e.target.value;
      updateJersey();
    });

    // ---------- থ্রি.জেএস সিন ----------
    const canvas = document.getElementById('preview-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x14142a);
    scene.fog = new THREE.Fog(0x14142a, 8, 20);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.4, 4.2);

    const hemi = new THREE.HemisphereLight(0xffffff, 0x222244, 0.7);
    scene.add(hemi);
    const key = new THREE.DirectionalLight(0xffffff, 1.3);
    key.position.set(3, 5, 4);
    key.castShadow = true;
    scene.add(key);
    const rim = new THREE.DirectionalLight(0x8a9dff, 0.6);
    rim.position.set(-4, 3, -3);
    scene.add(rim);

    // প্ল্যাটফর্ম
    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(1.4, 1.4, 0.15, 32),
      new THREE.MeshStandardMaterial({ color: 0x2a2a4a, metalness: 0.3, roughness: 0.4 })
    );
    platform.position.y = -0.075;
    platform.receiveShadow = true;
    scene.add(platform);

    // ---------- ক্যারেক্টার গ্রুপ ----------
    let charGroup = new THREE.Group();
    scene.add(charGroup);

    // জার্সি টেক্সচার তৈরি
    let jerseyCanvas = document.createElement('canvas');
    jerseyCanvas.width = 512;
    jerseyCanvas.height = 512;
    let jerseyTexture = new THREE.CanvasTexture(jerseyCanvas);

    function drawJersey() {
      const ctx = jerseyCanvas.getContext('2d');
      ctx.clearRect(0, 0, 512, 512);
      // জার্সি বেস কালার
      ctx.fillStyle = '#1b3a8a';
      ctx.fillRect(0, 0, 512, 512);
      // সাইড স্ট্রাইপ
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(0, 0, 40, 512);
      ctx.fillRect(472, 0, 40, 512);

      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffffff';
      // নাম
      ctx.font = 'bold 46px sans-serif';
      ctx.fillText(state.name.toUpperCase(), 256, 120);
      // বড় ব্যাচ নাম্বার
      ctx.font = 'bold 190px sans-serif';
      ctx.fillText(state.batch.replace(/\D/g, '') || '1', 256, 330);
      // ডিপার্টমেন্ট
      ctx.font = 'bold 34px sans-serif';
      ctx.fillText(state.dept, 256, 420);

      jerseyTexture.needsUpdate = true;
    }
    drawJersey();

    function buildCharacter() {
      charGroup.clear();
      const scale = state.height / 170;

      const jerseyMat = new THREE.MeshStandardMaterial({ map: jerseyTexture, roughness: 0.7 });
      const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.38, 0.9, 6, 12), jerseyMat);
      torso.position.y = 1.05 * scale;
      torso.scale.set(1, scale, 1);
      torso.castShadow = true;
      charGroup.add(torso);

      const pantsMat = new THREE.MeshStandardMaterial({ color: 0x22254a, roughness: 0.8 });
      const legs = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.28, 0.8, 12), pantsMat);
      legs.position.y = 0.4 * scale;
      legs.scale.set(1, scale, 1);
      legs.castShadow = true;
      charGroup.add(legs);

      const headMat = new THREE.MeshStandardMaterial({ color: state.skin, roughness: 0.6 });
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.26, 20, 20), headMat);
      head.position.y = 1.75 * scale;
      head.castShadow = true;
      charGroup.add(head);

      // হেয়ার
      if (state.hair !== 'none') {
        const hairMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5 });
        if (state.hair === 'short') {
          const hairMesh = new THREE.Mesh(new THREE.SphereGeometry(0.28, 16, 16, 0, Math.PI * 2, 0, Math.PI * 0.55), hairMat);
          hairMesh.position.y = 1.8 * scale;
          charGroup.add(hairMesh);
        } else {
          const hairMesh = new THREE.Mesh(new THREE.SphereGeometry(0.29, 16, 16, 0, Math.PI * 2, 0, Math.PI * 0.6), hairMat);
          hairMesh.position.y = 1.8 * scale;
          charGroup.add(hairMesh);
          const back = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 0.55, 12), hairMat);
          back.position.set(0, 1.55 * scale, -0.1);
          charGroup.add(back);
        }
      }

      // মেয়ে হলে সিম্পল স্কার্ট-স্টাইল লেগ শেপ
      if (state.gender === 'female') {
        legs.geometry.dispose();
        legs.geometry = new THREE.ConeGeometry(0.42, 0.75, 12);
        legs.position.y = 0.42 * scale;
      }
    }

    function updateCharacter() {
      buildCharacter();
    }
    function updateJersey() {
      drawJersey();
    }
    buildCharacter();

    // ---------- ড্র্যাগে ঘোরানো ----------
    let isDragging = false, lastX = 0;
    let rotY = 0.4;
    canvas.addEventListener('pointerdown', (e) => { isDragging = true; lastX = e.clientX; });
    window.addEventListener('pointerup', () => (isDragging = false));
    window.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      rotY += (e.clientX - lastX) * 0.008;
      lastX = e.clientX;
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      charGroup.rotation.y += (rotY - charGroup.rotation.y) * 0.1;
      if (!isDragging) rotY += 0.003; // অটো-রোটেশন
      renderer.render(scene, camera);
    }
    animate();

    // ---------- Start বাটন: ডেটা সেভ করে ক্যাম্পাসে যাওয়া ----------
    document.getElementById('start-btn').addEventListener('click', () => {
      localStorage.setItem('campusLifeCharacter', JSON.stringify(state));
      window.location.href = 'campus-life.html';
    });
  </script>
</body>
</html>
